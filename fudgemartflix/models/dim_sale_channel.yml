version: 2

models:
  - name: dim_sales_channel
    description: >
      Sales channel dimension. Static two-row dimension representing FudgeMart
      (Retail) and FudgeFlix (Subscription). No source table required.
    columns:
      - name: channel_key
        description: Surrogate key for the sales channel dimension
        tests:
          - not_null
          - unique

      - name: channel_name
        description: Name of the sales channel. Either 'FudgeMart' or 'FudgeFlix'
        tests:
          - not_null

      - name: channel_model
        description: Business model of the channel. FudgeMart is 'Retail', FudgeFlix is 'Subscription'
        tests:
          - not_null