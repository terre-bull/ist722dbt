version: 2

models:
  - name: dim_date
    description: >
      Date dimension sourced from RAW.CONFORMED.DATEDIMENSION. One row per calendar
      date, covering 1970-01-01 through approximately 30 years. Date key is in
      YYYYMMDD integer format, not a surrogate key.
    columns:
      - name: date_key
        description: Date dimension key in YYYYMMDD integer format (e.g. 20260101)
        tests:
          - not_null
          - unique

      - name: full_date
        description: Actual calendar date
        tests:
          - not_null

      - name: day_name
        description: Name of the day (e.g. Mon, Tue, Wed)
        tests:
          - not_null

      - name: month_name
        description: Name of the month (e.g. Jan, Feb, Mar)
        tests:
          - not_null

      - name: quarter
        description: Quarter label (Q1, Q2, Q3, Q4)
        tests:
          - not_null

      - name: year
        description: Four digit year (e.g. 2026)
        tests:
          - not_null

      - name: is_weekend
        description: Whether the date falls on a weekend. Yes or No
        tests:
          - not_null

      - name: is_holiday
        description: >
          Whether the date is a holiday. Currently defaulted to No as holiday
          data is not available in the source conformed date dimension.
        tests:
          - not_null